<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Coder-CLI Web Interface</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>A-Coder-CLI</h1>
      <div class="status" id="status">
        <span class="status-indicator disconnected"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <main class="chat-container">
      <div class="messages" id="messages">
        <div class="welcome-message">
          <h2>Welcome to A-Coder-CLI Web Interface</h2>
          <p>This is a browser-based interface for a-coder-cli.</p>
          <p>Messages sent from here will be processed by the CLI.</p>
        </div>
      </div>

      <div class="input-container">
        <textarea
          id="message-input"
          placeholder="Type your message..."
          rows="1"
          autofocus
        ></textarea>
        <button id="send-button" type="button">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </main>

    <footer>
      <span>Connected to <span id="server-url"></span></span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
